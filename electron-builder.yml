appId: com.scheduleassistant.app
productName: Schedule Assistant
directories:
  buildResources: build
  output: release
files:
  - dist-electron
  - dist
protocols:
  - name: Schedule Assistant
    schemes:
      - scheduleapp
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
  artifactName: ${productName}-${version}.${ext}
